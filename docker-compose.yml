services:

  outline:
      container_name: outline
      build:
        context: .
        dockerfile: Dockerfile
      env_file: ./docker.env
      expose:
        - "3000"
      volumes:
        - storage-data:/var/lib/outline/data
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      restart: unless-stopped

  redis:
    container_name: redis
    image: redis:7
    env_file: ./docker.env
    expose:
      - "6379"
    volumes:
      - ./redis.conf:/redis.conf
    command: ["redis-server", "/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3

  postgres:
    container_name: postgres
    image: postgres:17
    env_file: ./docker.env
    expose:
      - "5432"
    volumes:
      - database-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "outlinedb", "-U", "outlinedbadmin"]
      interval: 30s
      timeout: 20s
      retries: 3
#    environment:
#      POSTGRES_USER: ${POSTGRES_USER}
#      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
#      POSTGRES_DB: ${POSTGRES_DB}

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    restart: always
    volumes:
      # Reverse-proxy + TLS config (plain nginx, no ERB templating).
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Certs issued on the host by scripts/letsencrypt (DNS-01 / TSIG).
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - outline
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    expose:
      - "9000"
    environment:
      - TZ=Europe/London

volumes:
  storage-data:
  database-data:
  portainer-data:
